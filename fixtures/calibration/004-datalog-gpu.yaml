id: datalog-gpu
description: 学术 paper（Datalog on GPU）— 高信息密度但低 judgment 空间

input:
  platform: hacker_news
  title: "Optimizing Datalog for the GPU"
  primary_url: "https://news.ycombinator.com/item?id=47899000"
  original_url: "https://dl.acm.org/doi/..."
  metrics:
    hn_score: 95
    hn_comments: 8
  matched_keywords: ["GPU"]
  comments_preview: |
    - @user1: Souffle is the standard production Datalog engine; this work moves the dial.
    - @user2: Related: Differential Datalog from VMware. Also relevant for incremental queries.
    - @user3: Cool, but where's the open-source repo?

expected:
  final_score: 6.0
  layer: 留存层
  judgment_seed_keywords: []   # 见 notes：不锁定具体角度

tolerance:
  score: 1.5
  layer_strict: false

notes: |
  中分（5-7），originally 4.0 → 6.0 after 2026-04-26 calibration run.

  原假设："paper 类内容评论稀少 → judgment 空间小，应低分"——这是一个
  系统性偏差。模型从标题里就能挖出真实的二阶判断（如"GPU 加速对稀疏
  vs 稠密图效果不同"或"批处理 vs 递归收敛的语义张力"）。

  教训 1：judgment_space 不一定靠评论区争议触发；标题本身就可能携带
  反直觉的二阶判断角度。
  教训 2：judgment_seed_keywords 不应锁定具体角度——模型对同一话题
  能产出多个等效有效的视角，强制关键词是过度规范。这里留空，只校验
  score+layer。如要锁定 seed 必须包含某概念，后续可加；但 v0.1 默认
  不锁。

  layer 也从「转化层」改成「留存层」：这不是"教你用 GPU Datalog"的
  工具教程，而是"什么时候 GPU 加速划得来"的范式分析。
